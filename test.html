<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Counting Visualization</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="test.css">
</head>

<body>

<main class="app">
    <header class="hero">
        <p class="eyebrow">Counting Principle Explorer</p>
        <h1>5-Character Password Possibilities</h1>
        <p class="subtitle">Character pool: <strong>10 digits + 26 letters = 36 symbols</strong></p>
    </header>

    <section class="panel controls" aria-label="Calculation Mode">
        <button class="mode-btn" data-repeat="true">Repetition Allowed</button>
        <button class="mode-btn" data-repeat="false">No Repetition</button>
    </section>

    <section class="panel">
        <h2>Choices Per Position</h2>
        <div class="positions" id="positions"></div>
    </section>

    <section class="panel">
        <h2>Visual Bar Chart</h2>
        <div class="chart" id="chart"></div>
    </section>

    <section class="panel result-area" id="result" aria-live="polite"></section>

    <section class="panel qa">
        <h2>Questions</h2>
        <div class="question-grid">
            <button class="q-btn" data-q="drop">Why do choices decrease in the no-repetition case?</button>
            <button class="q-btn" data-q="impact">How big is the impact of allowing repetition?</button>
            <button class="q-btn" data-q="model">Which counting model is used in each case?</button>
            <button class="q-btn" data-q="reason">Explain the reasoning behind the calculations.</button>
        </div>
        <div class="answer" id="answer" aria-live="polite">Click a question to see the explanation.</div>
    </section>
</main>

<script src="test.js"></script>
</body>
</html>
